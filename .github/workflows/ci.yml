# CI workflow – runs validation checks on pull requests targeting main.
# This status check can be required by a branch ruleset to prevent
# merging PRs that break calculator conventions.
name: CI

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  validate:
    name: Validate HTML
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run validation
        run: python scripts/validate.py
