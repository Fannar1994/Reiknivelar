<!DOCTYPE html>
<html lang="is">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="favicon_io/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="favicon_io/apple-touch-icon.png">
  <title>Reiknivelar</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #f5f5f5;
      color: #333;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }
    header {
      text-align: center;
      margin-bottom: 40px;
    }
    header h1 {
      font-size: 2rem;
      color: #1a1a2e;
    }
    header p {
      margin-top: 8px;
      color: #666;
      font-size: 1rem;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 24px;
      width: 100%;
      max-width: 900px;
    }
    .card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      padding: 28px 24px;
      text-align: center;
      transition: box-shadow 0.2s;
    }
    .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.18); }
    .card h2 {
      font-size: 1.1rem;
      margin-bottom: 12px;
      color: #1a1a2e;
    }
    .card a {
      display: inline-block;
      margin-top: 8px;
      padding: 10px 22px;
      background: #3a7ca5;
      color: #fff;
      text-decoration: none;
      border-radius: 4px;
      font-size: 0.95rem;
      font-weight: bold;
      transition: background 0.2s;
    }
    .card a:hover { background: #2e6384; }
    footer {
      margin-top: 50px;
      color: #aaa;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>Reiknivelar</h1>
    <p>Veldu reiknivél til að hefja útreikninga</p>
  </header>

  <main class="grid">
    <div class="card">
      <h2>Girðinga reiknivél</h2>
      <a href="Girdingar_reiknivel.html">Opna reiknivél</a>
    </div>
    <div class="card">
      <h2>Hjólapalla reiknivél</h2>
      <a href="hjolapallar_reiknivel_sp.html">Opna reiknivél</a>
    </div>
    <div class="card">
      <h2>Loftastoðir</h2>
      <a href="loftastodir.html">Opna reiknivél</a>
    </div>
    <div class="card">
      <h2>Steypumótareiknivél</h2>
      <a href="motareiknivel-byko-v11.html">Opna reiknivél</a>
    </div>
    <div class="card">
      <h2>Vinnupalla reiknivél</h2>
      <a href="vinnupalla-reiknivel.html">Opna reiknivél</a>
    </div>
  </main>

  <footer>
    <p>&copy; BYKO Leiga</p>
  </footer>
</body>
</html>
